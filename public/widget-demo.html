<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DentaFlow Widget — Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 36px;
      text-align: center;
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #2563eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 28px; }
    .services {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .tag {
      padding: 5px 12px;
      background: #eff6ff;
      color: #2563eb;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 24px;
    }
    .hint span { color: #2563eb; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="26" height="26" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" viewBox="0 0 24 24">
        <path d="M12 2C8 2 4 5 4 9c0 5 3 8 4 10h8c1-2 4-5 4-10 0-4-4-7-8-7z"/>
        <path d="M9 12c0 1.5.7 3 3 3s3-1.5 3-3"/>
      </svg>
    </div>
    <h1>Smile Studio Dental</h1>
    <p>Award-winning dental care in the heart of the city.<br/>Book your appointment — we'd love to meet you.</p>
    <div class="services">
      <span class="tag">General dentistry</span>
      <span class="tag">Teeth whitening</span>
      <span class="tag">Invisalign</span>
      <span class="tag">Dental implants</span>
      <span class="tag">Emergency care</span>
    </div>
    <p class="hint">👇 Click the <span>Chat with us</span> button in the corner to book</p>
  </div>

  <!-- DentaFlow widget — api-url is set dynamically so this page works on any domain -->
  <script>
    window.DentaFlowConfig = {
      clinicId:   '84a3d357-1ea8-4b11-ae89-0e6088a358b6',
      apiUrl:     window.location.origin,
      clinicName: 'Smile Studio Dental',
      color:      '#2563eb'
    };
  </script>
  <script src="/widget.js"></script>
</body>
</html>
