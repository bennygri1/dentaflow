<!-- DentaFlow Chat Widget v2 -->
<!-- Paste this single snippet before </body> on your clinic website -->

<script
  src="https://your-domain.com/widget.js"
  data-clinic-id="YOUR-CLINIC-UUID"
  data-api-url="https://your-domain.com"
  data-clinic-name="Smile Studio"
  data-color="#2563eb">
</script>

<!--
  Attributes
  ──────────
  data-clinic-id    (required)  UUID from your DentaFlow profile
  data-api-url      (required)  Base URL of your deployed DentaFlow app — no trailing slash
  data-clinic-name  (optional)  Shown in the chat header and used in the AI's greeting
  data-color        (optional)  Hex primary colour, default #2563eb

  How it works
  ────────────
  The widget opens an AI chat panel (powered by Claude).
  When the patient provides their name and a contact method, the AI
  saves the lead automatically — no form, no submit button.

  Events (window.addEventListener)
  ─────────────────────────────────
  df:open     — panel opened
  df:message  — user sent a message  (detail: { text })
  df:lead     — lead saved to Supabase (detail: { id })
-->
